- name: "RWC01: My Quality Score"
  uri:
    url: "{{ superset_api }}/chart/"
    method: POST
    headers:
      Cookie: "{{ session_cookie }}"
      X-CSRFToken: "{{ csrf_token }}"
      Content-Type: application/json
    body_format: json
    body:
      slice_name: "My Quality Score"
      datasource_id: "{{ dataset_ids['dimension_coverage'] }}"
      datasource_type: "table"
      viz_type: "big_number_total"
      params: |
        {
          "metric": {"label": "pass_rate", "expressionType": "SIMPLE", "column": {"column_name": "pass_rate"}, "aggregate": "AVG"},
          "header_font_size": 0.4,
          "subheader_font_size": 0.15,
          "subheader": "Average Quality Score"
        }
    status_code: [200, 201]
  when: existing_charts.json.result | selectattr('slice_name', 'equalto', 'My Quality Score') | list | length == 0

- name: "RWC02: Check Pass Rate Gauge"
  uri:
    url: "{{ superset_api }}/chart/"
    method: POST
    headers:
      Cookie: "{{ session_cookie }}"
      X-CSRFToken: "{{ csrf_token }}"

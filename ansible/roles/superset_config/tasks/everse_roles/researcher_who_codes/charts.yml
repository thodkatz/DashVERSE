        {
          "x_axis": "month",
          "metrics": [{"label": "pass_rate", "expressionType": "SIMPLE", "column": {"column_name": "pass_rate"}, "aggregate": "AVG"}],
          "color_scheme": "supersetColors",
          "show_legend": false,
          "y_axis_format": ".1f"
        }
    status_code: [200, 201]
  when: existing_charts.json.result | selectattr('slice_name', 'equalto', 'Quality Over Time') | list | length == 0


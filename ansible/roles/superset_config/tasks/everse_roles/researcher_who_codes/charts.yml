          "color_scheme": "supersetColors"
        }
    status_code: [200, 201]
  when: existing_charts.json.result | selectattr('slice_name', 'equalto', 'Check Pass Rate Gauge') | list | length == 0

- name: "RWC03: Quality Over Time"
  uri:
    url: "{{ superset_api }}/chart/"
    method: POST
    headers:
      Cookie: "{{ session_cookie }}"
      X-CSRFToken: "{{ csrf_token }}"
      Content-Type: application/json

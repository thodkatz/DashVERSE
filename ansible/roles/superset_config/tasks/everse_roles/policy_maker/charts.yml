        {
          "groupby": ["software_name"],
          "metrics": [{"label": "count", "expressionType": "SQL", "sqlExpression": "COUNT(*)"}],
          "color_scheme": "supersetColors",
          "row_limit": 20,
          "show_legend": false
        }
    status_code: [200, 201]
  when: existing_charts.json.result | selectattr('slice_name', 'equalto', 'Quality by Software') | list | length == 0


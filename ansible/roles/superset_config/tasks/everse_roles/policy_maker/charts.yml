- name: "PM03: Assessment Activity Over Time"
  uri:
    url: "{{ superset_api }}/chart/"
    method: POST
    headers:
      Cookie: "{{ session_cookie }}"
      X-CSRFToken: "{{ csrf_token }}"
      Content-Type: application/json
    body_format: json
    body:
      slice_name: "Assessment Activity Over Time"
      datasource_id: "{{ dataset_ids['assessment_trends'] }}"
      datasource_type: "table"
      viz_type: "echarts_timeseries_line"
      params: |
        {
          "x_axis": "month",
          "metrics": [{"label": "assessments", "expressionType": "SIMPLE", "column": {"column_name": "assessments"}, "aggregate": "SUM"}],
          "color_scheme": "supersetColors",
          "show_legend": true,
          "rich_tooltip": true
        }
    status_code: [200, 201]
  when: existing_charts.json.result | selectattr('slice_name', 'equalto', 'Assessment Activity Over Time') | list | length == 0

- name: "PM04: Quality by Software"

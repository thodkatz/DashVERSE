- name: "PM01: Total Software Projects"
  uri:
    url: "{{ superset_api }}/chart/"
    method: POST
    headers:
      Cookie: "{{ session_cookie }}"
      X-CSRFToken: "{{ csrf_token }}"
      Content-Type: application/json
    body_format: json
    body:
      slice_name: "Total Software Projects"
      description: "Total number of software projects registered in the system for quality assessment."
      datasource_id: "{{ dataset_ids['software'] }}"
      datasource_type: "table"
      viz_type: "big_number_total"
      params: |
        {
          "metric": {"label": "count", "expressionType": "SQL", "sqlExpression": "COUNT(*)"},
          "header_font_size": 0.4,
          "subheader_font_size": 0.15,
          "subheader": "Software Projects Registered"
        }
    status_code: [200, 201]
  when: existing_charts.json.result | selectattr('slice_name', 'equalto', 'Total Software Projects') | list | length == 0

- name: "PM02: Total Assessments"
  uri:
    url: "{{ superset_api }}/chart/"

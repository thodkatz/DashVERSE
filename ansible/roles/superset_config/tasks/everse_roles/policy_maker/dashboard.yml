- name: Create Policy Maker dashboard
  uri:
    url: "{{ superset_api }}/dashboard/"
    method: POST
    headers:
      Cookie: "{{ session_cookie }}"
      X-CSRFToken: "{{ csrf_token }}"
      Content-Type: application/json
    body_format: json
    body:
      dashboard_title: "Policy Maker"
      slug: "policy-maker"
      published: true
      json_metadata: |
        {
          "expanded_slices": {},
          "refresh_frequency": 0,
          "color_scheme": "supersetColors",
          "label_colors": {},
          "shared_label_colors": {},
          "cross_filters_enabled": true,
          "default_filters": "{}"
        }
    status_code: [200, 201]
  when: existing_dashboards.json.result | selectattr('slug', 'equalto', 'policy-maker') | list | length == 0
  register: policy_maker_created

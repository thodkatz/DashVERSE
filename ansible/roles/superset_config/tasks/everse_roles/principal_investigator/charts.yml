- name: "PI01: Projects Overview"
  uri:
    url: "{{ superset_api }}/chart/"
    method: POST
    headers:
      Cookie: "{{ session_cookie }}"
      X-CSRFToken: "{{ csrf_token }}"
      Content-Type: application/json
    body_format: json
    body:
      slice_name: "Projects Overview"
      datasource_id: "{{ dataset_ids['assessments_detailed'] }}"
      datasource_type: "table"
      viz_type: "big_number_total"
      params: |
        {
          "metric": {"label": "count", "expressionType": "SQL", "sqlExpression": "COUNT(DISTINCT software_name)"},
          "header_font_size": 0.4,
          "subheader_font_size": 0.15,
          "subheader": "Unique Projects Assessed"
        }
    status_code: [200, 201]
  when: existing_charts.json.result | selectattr('slice_name', 'equalto', 'Projects Overview') | list | length == 0

- name: "PI02: Quality Across Projects"
  uri:
    url: "{{ superset_api }}/chart/"
    method: POST
    headers:
      Cookie: "{{ session_cookie }}"
      X-CSRFToken: "{{ csrf_token }}"
      Content-Type: application/json
    body_format: json
    body:
      slice_name: "Quality Across Projects"
      datasource_id: "{{ dataset_ids['software_quality_scores'] }}"
      datasource_type: "table"
      viz_type: "dist_bar"
      params: |
        {
          "groupby": ["software_name"],
          "metrics": [{"label": "score", "expressionType": "SIMPLE", "column": {"column_name": "score"}, "aggregate": "AVG"}],
          "color_scheme": "supersetColors",
          "row_limit": 20,
          "show_bar_value": true,
          "y_axis_format": ".1f"
        }
    status_code: [200, 201]
  when: existing_charts.json.result | selectattr('slice_name', 'equalto', 'Quality Across Projects') | list | length == 0


- name: "RSE01: Total Checks"
  uri:
    url: "{{ superset_api }}/chart/"
    method: POST
    headers:
      Cookie: "{{ session_cookie }}"
      X-CSRFToken: "{{ csrf_token }}"
      Content-Type: application/json
    body_format: json
    body:
      slice_name: "Total Checks"
      datasource_id: "{{ dataset_ids['checks_detailed'] }}"
      datasource_type: "table"
      viz_type: "big_number_total"
      params: |
        {
          "metric": {"label": "count", "expressionType": "SQL", "sqlExpression": "COUNT(*)"},
          "header_font_size": 0.4,
          "subheader_font_size": 0.15,
          "subheader": "Total Checks Performed"
        }
    status_code: [200, 201]
  when: existing_charts.json.result | selectattr('slice_name', 'equalto', 'Total Checks') | list | length == 0


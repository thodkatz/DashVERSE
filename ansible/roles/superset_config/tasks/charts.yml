# ============================================================
# Get all charts for dashboard creation
# ============================================================

- name: Get all charts for dashboard creation
  uri:
    url: "{{ superset_api }}/chart/?q=(page_size:100)"
    method: GET
    headers:
      Authorization: "Bearer {{ access_token }}"
    status_code: 200
  register: all_charts

- name: Build chart ID mapping
  set_fact:
    chart_ids: "{{ chart_ids | default({}) | combine({item.slice_name: item.id}) }}"
  loop: "{{ all_charts.json.result }}"
  loop_control:
    label: "{{ item.slice_name }}"

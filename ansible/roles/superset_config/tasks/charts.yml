        {
          "x_axis": "month",
          "metrics": [{"label": "assessments", "expressionType": "SIMPLE", "column": {"column_name": "assessments"}, "aggregate": "SUM"}],
          "color_scheme": "supersetColors",
          "show_legend": true,
          "rich_tooltip": true
        }
    status_code: [200, 201]
  when: existing_charts.json.result | selectattr('slice_name', 'equalto', 'Assessment Activity Over Time') | list | length == 0


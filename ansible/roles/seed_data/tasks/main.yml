---
# Apply example assessments from the local SQL file to PostgreSQL.
# The SQL file is idempotent: it deletes rows tagged with the seed @id prefix
# before inserting fresh ones, so re-running the play is safe.

- name: Apply assessment example seed data
  command:
    cmd: kubectl exec -i -n dashverse deploy/postgresql -- psql -U {{ database_user }} -d {{ database_db }} -v ON_ERROR_STOP=1
    stdin: "{{ lookup('file', playbook_dir + '/../../database/sql/data/004_assessment_examples.sql') }}"
  register: seed_result
  changed_when: "'INSERT' in seed_result.stdout"

- name: Show seed apply summary
  debug:
    msg: "{{ seed_result.stdout_lines }}"
